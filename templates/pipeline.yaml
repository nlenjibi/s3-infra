AWSTemplateFormatVersion: '2010-09-09'
Description: BEM13 ECS CICD | Stack 9 of 9 — S3 artifacts, EventBridge rule, CodePipeline

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, test, prod]
  ProjectName:
    Type: String
    Default: bem13

Resources:

  # ── S3 Artifact Bucket ─────────────────────────────────────────
  # Stores deploy-artifacts.zip (taskdef.json + appspec.yaml)
  # uploaded by GitHub Actions before each ECR push.
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::AccountId}-${AWS::Region}-${Environment}-${ProjectName}-artifacts"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-artifacts"
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation-GitSync

  # ── EventBridge Rule ───────────────────────────────────────────
  # Fires when GitHub Actions pushes the "{env}-latest" image tag,
  # which starts the CodePipeline execution automatically.
  EcrPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-${ProjectName}-ecr-push"
      Description: !Sub "Start ${Environment}-${ProjectName}-pipeline on ECR image push"
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS
          repository-name:
            - !Sub "${ProjectName}-app"
          image-tag:
            - !Sub "${Environment}-latest"
      State: ENABLED
      Targets:
        - Id: StartCodePipeline
          Arn: !Sub
            - "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${PipelineName}"
            - PipelineName: !Ref Pipeline
          RoleArn:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-EventBridgeRoleArn"

  # ── CodePipeline ───────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${Environment}-${ProjectName}-pipeline"
      RoleArn:
        Fn::ImportValue: !Sub "${Environment}-${ProjectName}-CodePipelineRoleArn"
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:

        # ── Stage 1: Source ──────────────────────────────────────
        - Name: Source
          Actions:
            # ECR source: provides imageDetail.json with the pushed image URI.
            # CodePipeline substitutes <IMAGE1_NAME> in taskdef.json with this URI.
            - Name: ECRSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: ECR
                Version: '1'
              Configuration:
                RepositoryName:
                  Fn::ImportValue: !Sub "${Environment}-${ProjectName}-RepositoryName"
                ImageTag: !Sub "${Environment}-latest"
              OutputArtifacts:
                - Name: ECRImageArtifact
              RunOrder: 1

            # S3 source: fetches deploy-artifacts.zip (taskdef.json + appspec.yaml)
            # uploaded by GitHub Actions just before the ECR push.
            - Name: DeployArtifactsSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: S3
                Version: '1'
              Configuration:
                S3Bucket: !Ref ArtifactBucket
                S3ObjectKey: !Sub "${Environment}/deploy-artifacts.zip"
                PollForSourceChanges: 'false'
              OutputArtifacts:
                - Name: DeployArtifacts
              RunOrder: 1

        # ── Stage 2: Deploy ──────────────────────────────────────
        - Name: Deploy
          Actions:
            - Name: BlueGreenDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToECS
                Version: '1'
              Configuration:
                ApplicationName:
                  Fn::ImportValue: !Sub "${Environment}-${ProjectName}-CodeDeployAppName"
                DeploymentGroupName:
                  Fn::ImportValue: !Sub "${Environment}-${ProjectName}-DeploymentGroupName"
                # taskdef.json template — <IMAGE1_NAME> is substituted with
                # the ECR image URI from ECRImageArtifact/imageDetail.json.
                TaskDefinitionTemplateArtifact: DeployArtifacts
                TaskDefinitionTemplatePath: taskdef.json
                AppSpecTemplateArtifact: DeployArtifacts
                AppSpecTemplatePath: appspec.yaml
                Image1ArtifactName: ECRImageArtifact
                Image1ContainerName: app
              InputArtifacts:
                - Name: ECRImageArtifact
                - Name: DeployArtifacts
              RunOrder: 1

      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: !Sub "${Environment}-${ProjectName}-PipelineName"

  ArtifactsBucket:
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ArtifactsBucket"
