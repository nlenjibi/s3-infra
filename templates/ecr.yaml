AWSTemplateFormatVersion: '2010-09-09'
Description: BEM13 ECS CICD | Stack 3 of 9 — ECR repository with immutable tags

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, test, prod]
  ProjectName:
    Type: String
    Default: bem13

Resources:

  Repository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectName}-app"
      # Immutable tags: once pushed, a tag cannot be overwritten.
      # The mutable "{env}-latest" tag is intentionally omitted from
      # the immutability rule — it acts as a pointer so EventBridge
      # can watch a stable tag name per environment.
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Retain last 15 immutable commit-tagged images per env",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["dev-", "test-", "prod-"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 15
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Remove untagged images after 1 day",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 1
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-ecr"
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: CloudFormation-GitSync

Outputs:
  RepositoryUri:
    Value: !GetAtt Repository.RepositoryUri
    Export:
      Name: !Sub "${Environment}-${ProjectName}-RepositoryUri"

  RepositoryName:
    Value: !Ref Repository
    Export:
      Name: !Sub "${Environment}-${ProjectName}-RepositoryName"

  RepositoryArn:
    Value: !GetAtt Repository.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-RepositoryArn"
