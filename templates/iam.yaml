AWSTemplateFormatVersion: '2010-09-09'
Description: BEM13 ECS CICD | Stack 4 of 9 — IAM roles (least-privilege)

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, test, prod]
  ProjectName:
    Type: String
    Default: bem13

Resources:

  # ── ECS Task Execution Role ────────────────────────────────────
  # Allows the ECS agent to pull images from ECR and write logs.
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-ecs-exec-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ecr-and-logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRPull
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: "*"
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${Environment}-${ProjectName}:*"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── ECS Task Role ──────────────────────────────────────────────
  # Permissions granted to application code running inside the container.
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── CodePipeline Role ──────────────────────────────────────────
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-codepipeline-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: pipeline-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Artifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub "arn:aws:s3:::${AWS::AccountId}-${AWS::Region}-${Environment}-${ProjectName}-artifacts"
                  - !Sub "arn:aws:s3:::${AWS::AccountId}-${AWS::Region}-${Environment}-${ProjectName}-artifacts/*"
              - Sid: CodeDeploy
                Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                Resource: "*"
              - Sid: ECS
                Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RegisterTaskDefinition
                  - ecs:TagResource
                Resource: "*"
              - Sid: ECR
                Effect: Allow
                Action:
                  - ecr:DescribeImages
                Resource: "*"
              - Sid: PassRoles
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt EcsTaskExecutionRole.Arn
                  - !GetAtt EcsTaskRole.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── CodeDeploy Role ────────────────────────────────────────────
  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-codedeploy-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── EventBridge Role ───────────────────────────────────────────
  # Allows EventBridge to start CodePipeline execution on ECR push.
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-eventbridge-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: start-pipeline
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource:
                  - !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Environment}-${ProjectName}-pipeline"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── GitHub Actions OIDC Role ───────────────────────────────────
  # Federated role assumed by GitHub Actions via OIDC — no static keys.
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ProjectName}-github-actions-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Restrict to your GitHub org/repo — update before deploying
                token.actions.githubusercontent.com:sub: "repo:YOUR_GITHUB_ORG/YOUR_APP_REPO:ref:refs/heads/*"
      Policies:
        - PolicyName: ecr-push-and-s3-upload
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: ECRPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:DescribeImages
                Resource:
                  - !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${ProjectName}-app"
              - Sid: S3ArtifactUpload
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${AWS::AccountId}-${AWS::Region}-${Environment}-${ProjectName}-artifacts/*"
              - Sid: ReadCFNExports
                Effect: Allow
                Action: cloudformation:ListExports
                Resource: "*"
              - Sid: GetCallerIdentity
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: "*"
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  EcsTaskExecutionRoleArn:
    Value: !GetAtt EcsTaskExecutionRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-EcsTaskExecutionRoleArn"

  EcsTaskRoleArn:
    Value: !GetAtt EcsTaskRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-EcsTaskRoleArn"

  CodePipelineRoleArn:
    Value: !GetAtt CodePipelineRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-CodePipelineRoleArn"

  CodeDeployRoleArn:
    Value: !GetAtt CodeDeployRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-CodeDeployRoleArn"

  EventBridgeRoleArn:
    Value: !GetAtt EventBridgeRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-EventBridgeRoleArn"

  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-GitHubActionsRoleArn"
