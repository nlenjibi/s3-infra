AWSTemplateFormatVersion: '2010-09-09'
Description: BEM13 ECS CICD | Stack 9 of 9 — S3 artifacts, CodePipeline

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, test, prod]
  ProjectName:
    Type: String
    Default: bem14

Resources:

  # ── S3 Artifact Bucket ─────────────────────────────────────────
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub "${AWS::AccountId}-${AWS::Region}-${Environment}-${ProjectName}-artifacts"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-artifacts"
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: CloudFormation-GitSync

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub "${ArtifactBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # ── EventBridge Rule ───────────────────────────────────────────
  # Fires when GitHub Actions pushes the "latest" image tag to ECR.
  EcrPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-${ProjectName}-ecr-push"
      Description: !Sub "Start ${Environment}-${ProjectName}-pipeline on ECR latest push"
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS
          repository-name:
            - !Sub "${ProjectName}-java-app"
          image-tag:
            - latest
      State: ENABLED
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-ecr-push"
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: CloudFormation-GitSync
      Targets:
        - Id: StartCodePipeline
          Arn: !Sub
            - "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${PipelineName}"
            - PipelineName: !Ref Pipeline
          RoleArn:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-EventBridgeRoleArn"

  # ── CodePipeline ───────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${Environment}-${ProjectName}-pipeline"
      RoleArn:
        Fn::ImportValue: !Sub "${Environment}-${ProjectName}-CodePipelineRoleArn"
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:

        # ── Stage 1: Source ──────────────────────────────────────
        - Name: Source
          Actions:
            - Name: DeployArtifactsSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: S3
                Version: '1'
              Configuration:
                S3Bucket: !Ref ArtifactBucket
                S3ObjectKey: !Sub "${Environment}/deploy-artifacts.zip"
                PollForSourceChanges: 'false'
              OutputArtifacts:
                - Name: DeployArtifacts
              RunOrder: 1

        # ── Stage 2: Deploy ──────────────────────────────────────
        - Name: Deploy
          Actions:
            - Name: BlueGreenDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToECS
                Version: '1'
              Configuration:
                ApplicationName:
                  Fn::ImportValue: !Sub "${Environment}-${ProjectName}-CodeDeployAppName"
                DeploymentGroupName:
                  Fn::ImportValue: !Sub "${Environment}-${ProjectName}-DeploymentGroupName"
                TaskDefinitionTemplateArtifact: DeployArtifacts
                TaskDefinitionTemplatePath: taskdef.json
                AppSpecTemplateArtifact: DeployArtifacts
                AppSpecTemplatePath: appspec.yaml
              InputArtifacts:
                - Name: DeployArtifacts
              RunOrder: 1

      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-pipeline"
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: CloudFormation-GitSync

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: !Sub "${Environment}-${ProjectName}-PipelineName"

  ArtifactsBucket:
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub "${Environment}-${ProjectName}-ArtifactsBucket"
