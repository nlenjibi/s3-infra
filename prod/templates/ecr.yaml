AWSTemplateFormatVersion: '2010-09-09'
Description: BEM13 ECS CICD | Stack 3 of 9 — ECR repository with immutable tags

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, test, prod]
  ProjectName:
    Type: String
    Default: bem14

Resources:

  Repository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectName}-java-app"
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Delete untagged images older than 30 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 30
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ProjectName}-ecr"
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: ManagedBy
          Value: CloudFormation-GitSync

Outputs:
  RepositoryUri:
    Value: !GetAtt Repository.RepositoryUri
    Export:
      Name: !Sub "${Environment}-${ProjectName}-RepositoryUri"

  RepositoryName:
    Value: !Ref Repository
    Export:
      Name: !Sub "${Environment}-${ProjectName}-RepositoryName"

  RepositoryArn:
    Value: !GetAtt Repository.Arn
    Export:
      Name: !Sub "${Environment}-${ProjectName}-RepositoryArn"
