AWSTemplateFormatVersion: '2010-09-09'
Description: BEM13 ECS CICD | Stack 8 of 9 — CodeDeploy ECS blue/green application

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, test, prod]
  ProjectName:
    Type: String
    Default: bem14
  # Minutes to keep the old (blue) task set alive after traffic cuts to green.
  BlueTerminationWaitMinutes:
    Type: Number
    Default: 5

Resources:

  # ── CodeDeploy Application ─────────────────────────────────────
  Application:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub "${Environment}-${ProjectName}-app"
      ComputePlatform: ECS
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName

  # ── Deployment Group ───────────────────────────────────────────
  # BLUE_GREEN with WITH_TRAFFIC_CONTROL: CodeDeploy registers the
  # new task set with the green target group, runs health checks,
  # then shifts the production listener to green. The old (blue) set
  # drains and terminates after BlueTerminationWaitMinutes.
  DeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref Application
      DeploymentGroupName: !Sub "${Environment}-${ProjectName}-dg"
      ServiceRoleArn:
        Fn::ImportValue: !Sub "${Environment}-${ProjectName}-CodeDeployRoleArn"
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE
          - DEPLOYMENT_STOP_ON_ALARM
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      BlueGreenDeploymentConfiguration:
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
          WaitTimeInMinutes: 0
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: !Ref BlueTerminationWaitMinutes
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - ProdTrafficRoute:
              ListenerArns:
                - Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ProductionListenerArn"
            TestTrafficRoute:
              ListenerArns:
                - Fn::ImportValue: !Sub "${Environment}-${ProjectName}-TestListenerArn"
            TargetGroups:
              - Name:
                  Fn::ImportValue: !Sub "${Environment}-${ProjectName}-BlueTargetGroupName"
              - Name:
                  Fn::ImportValue: !Sub "${Environment}-${ProjectName}-GreenTargetGroupName"
      ECSServices:
        - ClusterName:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ClusterName"
          ServiceName:
            Fn::ImportValue: !Sub "${Environment}-${ProjectName}-ServiceName"
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  ApplicationName:
    Value: !Ref Application
    Export:
      Name: !Sub "${Environment}-${ProjectName}-CodeDeployAppName"

  DeploymentGroupName:
    Value: !Ref DeploymentGroup
    Export:
      Name: !Sub "${Environment}-${ProjectName}-DeploymentGroupName"
